server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve React app - all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the correct backend services
    location /api/are/ {
        proxy_pass http://are:8000;
        proxy_set_header Host $host;
    }

    location /api/simulation/ {
        proxy_pass http://dag:8001;
        proxy_set_header Host $host;
    }

    location /api/auth/ {
        proxy_pass http://auth:8002;
        proxy_set_header Host $host;
    }

    location /api/siem/ {
        proxy_pass http://siem:8003;
        proxy_set_header Host $host;
    }

    location /api/report/ {
        proxy_pass http://report:8004;
        proxy_set_header Host $host;
    }

    location /api/detect {
        proxy_pass http://ivm:5000;
        proxy_set_header Host $host;
    }

    location /api/xai/ {
        proxy_pass http://xai:5001;
        proxy_set_header Host $host;
    }
}